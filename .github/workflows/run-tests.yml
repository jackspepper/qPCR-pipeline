name: Run qPCR Pipeline Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'

      - name: Install dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::tidyverse
            any::openxlsx
            any::cli
            any::fs
            any::rlang

      - name: Install qpcrpipeline package
        run: |
          Rscript -e "install.packages('.', repos = NULL, type = 'source')"

      - name: Run qPCR Pipeline on Example Data
        run: |
          Rscript inst/example_project/qpcr_pipeline.R
